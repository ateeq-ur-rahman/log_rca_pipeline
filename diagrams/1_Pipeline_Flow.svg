<svg width="100%" viewBox="0 0 680 820" role="img">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="680" height="820" fill="#FFFFFF"/>

  <text x="340" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#2C2C2A">Log Error Detection & RCA Pipeline</text>
  <text x="340" y="60" text-anchor="middle" font-size="14" fill="#888780">From raw logs to actionable root causes</text>

  <!-- Stage 1: INPUT -->
  <rect x="80" y="90" width="520" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="340" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Raw Logs from Services</text>
  <text x="340" y="135" text-anchor="middle" font-size="12" fill="#888780">2026-06-17T10:15:06.100Z [mongodb] ERROR Connection pool exhausted...</text>

  <line x1="340" y1="150" x2="340" y2="190" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: PARSER -->
  <rect x="80" y="190" width="520" height="80" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="340" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#042C53">Parser (Regex-based)</text>
  <text x="340" y="235" text-anchor="middle" font-size="12" fill="#0C447C">Extract timestamp, service, level, message</text>
  <text x="340" y="252" text-anchor="middle" font-size="12" fill="#0C447C">Output: 38 LogEntry objects parsed</text>

  <line x1="340" y1="270" x2="340" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: CLASSIFIER -->
  <rect x="80" y="310" width="520" height="100" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#042C2A">Classifier (Pattern Matching)</text>
  <text x="340" y="355" text-anchor="middle" font-size="12" fill="#085041">• Categorize errors: DB_POOL_EXHAUSTED, SERVICE_UNAVAILABLE...</text>
  <text x="340" y="372" text-anchor="middle" font-size="12" fill="#085041">• Mark as root-cause candidate or symptom</text>
  <text x="340" y="389" text-anchor="middle" font-size="12" fill="#085041">Output: 16 ErrorEvent objects classified</text>

  <line x1="340" y1="410" x2="340" y2="450" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: CLUSTERING -->
  <rect x="80" y="450" width="520" height="100" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="340" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#4A1B0C">Clustering (Graph-Aware)</text>
  <text x="340" y="495" text-anchor="middle" font-size="12" fill="#712B13">• Time-window correlation (8s gap threshold)</text>
  <text x="340" y="512" text-anchor="middle" font-size="12" fill="#712B13">• Service dependency graph awareness</text>
  <text x="340" y="529" text-anchor="middle" font-size="12" fill="#712B13">Output: 2 Incidents (noise filtered)</text>

  <line x1="340" y1="550" x2="340" y2="590" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: RCA ENGINE -->
  <rect x="80" y="590" width="520" height="120" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="340" y="615" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215C">RCA Engine (Scoring)</text>
  <text x="340" y="635" text-anchor="middle" font-size="12" fill="#3C3489">Score each error across 3 dimensions:</text>
  <text x="340" y="652" text-anchor="middle" font-size="12" fill="#3C3489">• Root-cause category flag (0.45 weight)</text>
  <text x="340" y="669" text-anchor="middle" font-size="12" fill="#3C3489">• Downstream impact: services depending (0.35)</text>
  <text x="340" y="686" text-anchor="middle" font-size="12" fill="#3C3489">• Temporal position: how early (0.20)</text>

  <line x1="340" y1="710" x2="340" y2="750" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: OUTPUT -->
  <rect x="80" y="750" width="520" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="775" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">RCA Reports (Root Cause + Symptom Chain)</text>
  <text x="340" y="795" text-anchor="middle" font-size="12" fill="#633806">MongoDB DB_POOL_EXHAUSTED (98% confidence) → 5 affected services</text>

  <!-- Side labels -->
  <rect x="15" y="185" width="60" height="40" rx="4" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.5"/>
  <text x="45" y="200" text-anchor="middle" font-size="11" fill="#888780">38 lines</text>
  <text x="45" y="216" text-anchor="middle" font-size="11" fill="#888780">parsed</text>

  <rect x="15" y="305" width="60" height="40" rx="4" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.5"/>
  <text x="45" y="320" text-anchor="middle" font-size="11" fill="#888780">16 error</text>
  <text x="45" y="336" text-anchor="middle" font-size="11" fill="#888780">events</text>

  <rect x="15" y="445" width="60" height="40" rx="4" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.5"/>
  <text x="45" y="460" text-anchor="middle" font-size="11" fill="#888780">2 clean</text>
  <text x="45" y="476" text-anchor="middle" font-size="11" fill="#888780">incidents</text>
</svg>